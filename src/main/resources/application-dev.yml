spring:
  # Templates reloading during development
  thymeleaf:
    prefix: file:src/main/resources/templates/
    cache: false

  # Static resources reloading during development
  resources:
    static-locations: file:src/main/resources/static/
    cache-period: 0

 # set up users
#  security:
#    user:
#      name: admin
#      password: admin

  datasource:
    url: jdbc:h2:mem:testdb
  h2:
    console:
      enable: true
      path: /h2-console

  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: create